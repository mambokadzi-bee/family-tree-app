<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Tree</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div id="header-top">
      <div id="family-name-wrap">
        <div id="family-name" contenteditable="true" spellcheck="false" title="Click to edit family name">Family Tree</div>
        <span class="edit-hint">click to edit</span>
      </div>
      <div id="header-meta">
        <div class="meta-field">
          <label for="created-by-input">Created by <span class="required">*</span></label>
          <input type="text" id="created-by-input" placeholder="Your name (required)" autocomplete="off">
          <span id="created-by-error" class="meta-error hidden">This field is required.</span>
        </div>
        <div class="meta-field">
          <label>Last Date of Update</label>
          <span id="last-updated-display">—</span>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div id="tree-container">
      <svg id="connector-svg" aria-hidden="true"></svg>
      <div id="tree-rows"></div>
    </div>
  </main>

  <!-- Add Member Modal -->
  <div id="modal-overlay" class="hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div id="modal">
      <h2 id="modal-title">Add Family Member</h2>
      <p id="modal-subtitle"></p>
      <form id="member-form" novalidate>
        <label for="input-name">Name <span class="required">*</span></label>
        <input type="text" id="input-name" placeholder="Full name" autocomplete="off" required>
        <span id="name-error" class="field-error hidden">Name is required.</span>

        <label for="input-profession">Profession</label>
        <input type="text" id="input-profession" placeholder="e.g. Farmer (optional)" autocomplete="off">

        <div class="modal-actions">
          <button type="button" id="modal-cancel">Cancel</button>
          <button type="submit" id="modal-submit">Add Member</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
